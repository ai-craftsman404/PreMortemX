name: premortemx-ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run PreMortemX script tests
        shell: pwsh
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File .\plugins\premortemx\scripts\tests\Run-PreMortemXScriptTests.ps1
